# ============================================================
# DNS Attack Detection - Main Configuration
# ============================================================

project:
  name: "DNS Attack Detection ML System"
  version: "1.0.0"
  description: "Production-ready ML/DL system for DNS attack detection"

# ---- Paths ----
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  datasets: "datasets"
  models: "models"
  logs: "logs"
  reports: "reports"
  checkpoints: "checkpoints"

# ---- Dataset Configuration ----
dataset:
  # Supported: cic_dns, cira_doh, unsw_nb15, synthetic
  source: "synthetic"
  test_size: 0.15
  val_size: 0.15
  random_state: 42
  stratify: true

# ---- Labels / Attack Types ----
attack_types:
  - "benign"
  - "dns_ddos"
  - "dns_amplification"
  - "dns_tunneling"
  - "cache_poisoning"
  - "nxdomain_attack"
  - "data_exfiltration"
  - "botnet_dns"

label_column: "label"
binary_label_column: "is_attack"

# ---- Preprocessing ----
preprocessing:
  handle_missing: "median"          # mean | median | drop
  outlier_method: "iqr"             # iqr | zscore | none
  outlier_threshold: 3.0
  scaler: "standard"                # standard | minmax | robust
  encode_categoricals: true

# ---- Feature Engineering ----
feature_engineering:
  entropy_features: true
  time_window_seconds: 60
  aggregation_windows: [10, 30, 60, 300]
  min_query_freq_threshold: 2
  max_subdomain_depth: 10

# ---- Imbalance Handling ----
imbalance:
  strategy: "smote"                 # smote | class_weight | none
  sampling_strategy: "auto"
  k_neighbors: 5

# ---- Supervised Models ----
supervised:
  random_forest:
    n_estimators: 200
    max_depth: 20
    min_samples_split: 5
    min_samples_leaf: 2
    class_weight: "balanced"
    n_jobs: -1
    random_state: 42

  xgboost:
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 1
    n_jobs: -1
    random_state: 42
    eval_metric: "logloss"
    use_label_encoder: false

  svm:
    kernel: "rbf"
    C: 1.0
    gamma: "scale"
    probability: true
    class_weight: "balanced"
    max_iter: 5000

  mlp:
    hidden_layers: [256, 128, 64]
    dropout_rate: 0.3
    learning_rate: 0.001
    batch_size: 256
    epochs: 50
    patience: 10
    activation: "relu"

  lstm:
    hidden_size: 128
    num_layers: 2
    dropout_rate: 0.3
    learning_rate: 0.001
    batch_size: 64
    epochs: 30
    patience: 7
    sequence_length: 20

# ---- Unsupervised Models ----
unsupervised:
  isolation_forest:
    n_estimators: 200
    contamination: 0.05
    max_samples: "auto"
    random_state: 42
    n_jobs: -1

  one_class_svm:
    kernel: "rbf"
    nu: 0.05
    gamma: "scale"

  dbscan:
    eps: 3.6
    min_samples: 10
    algorithm: "auto"
    n_jobs: -1

  autoencoder:
    encoding_dims: [64, 32, 16]
    learning_rate: 0.001
    batch_size: 256
    epochs: 50
    patience: 10
    anomaly_threshold_percentile: 95

# ---- Hyperparameter Tuning ----
hyperparameter_tuning:
  method: "random_search"           # grid_search | random_search | optuna
  cv_folds: 5
  n_iter: 50
  scoring: "f1_weighted"
  n_jobs: -1
  verbose: 1

# ---- Evaluation ----
evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
    - "confusion_matrix"
  average: "weighted"
  save_plots: true
  plot_format: "png"
  dpi: 150

# ---- Real-Time Detection ----
realtime:
  interface: "eth0"                 # Network interface to sniff
  filter: "udp port 53 or tcp port 53"
  packet_buffer_size: 1000
  inference_window: 10              # seconds
  alert_threshold: 0.75
  model: "random_forest"            # Model to use for inference
  async_workers: 4
  log_alerts: true

# ---- FastAPI Alerts ----
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 2
  alert_webhook_url: ""             # Optional webhook URL

# ---- Logging ----
logging:
  level: "INFO"
  format: "json"
  log_file: "logs/dns_detection.log"
  max_bytes: 10485760               # 10 MB
  backup_count: 5
